<!DOCTYPE html>
<html lang="ja">
<head><link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="icon-180.png" sizes="180x180">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d97a8e">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>買い物リスト</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff7f8;color:#444}
.header{position:sticky;top:0;background:#fff;padding:13px 15px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;z-index:10}
.title{font-size:26px;font-weight:bold}
.topActions{display:flex;gap:7px;align-items:center}
.storeAdd{border:none;background:#d97a8e;color:#fff;border-radius:12px;padding:11px 14px;font-size:17px;cursor:pointer}
.shoppingMode{border:none;background:#f4d7df;color:#7d3f4e;border-radius:12px;padding:11px 13px;font-size:17px;cursor:pointer}
.shoppingMode.active{background:#d97a8e;color:#fff}
.container{padding:11px}
.card{background:#fff;border-radius:16px;padding:13px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.empty{background:#fff;border-radius:16px;padding:18px;margin:12px;color:#9a6571;text-align:center;font-size:18px}
.shopRow{display:flex;align-items:center;gap:7px}
.shop{flex:1;font-size:22px;font-weight:bold;color:#d97a8e;cursor:pointer}
.btn{border:none;background:#f4d7df;border-radius:10px;padding:7px 11px;font-size:17px;cursor:pointer}
.btn.deleteModeBtn{background:#d97a8e;color:#fff}
.inputWrap{margin-top:9px}
.collapseBtn{min-width:34px;text-align:center}
.input{width:100%;box-sizing:border-box;padding:11px;border:1px solid #ddd;border-radius:12px;font-size:17px}
.chips{display:flex;flex-wrap:wrap;align-items:flex-start;gap:5px;margin-top:11px}.card{overflow:hidden}
.chip{
position:relative;
border:none;
border-radius:18px;
padding:9px 13px;
font-size:17px;
background:#f4d7df;
cursor:pointer;
transition:transform .22s ease,opacity .22s ease,background-color .2s ease;
will-change:transform;
}.chipWrap{
position:relative;
display:flex;
flex:0 0 auto;
transition:transform .22s ease;
will-change:transform;
}.deleteX{position:absolute;right:-6px;top:-6px;width:22px;height:22px;border-radius:50%;border:none;background:#fff;color:#d97a8e;font-weight:bold;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.chip.active{background:#d97a8e;color:#fff}
.menu{position:fixed;background:white;border:1px solid #ddd;border-radius:12px;padding:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);display:none;z-index:1000}
.menu button{display:block;width:100%;border:none;background:none;padding:10px;cursor:pointer;text-align:left}
@media(max-width:520px){
 .header{padding:10px;gap:8px}
 .title{font-size:22px}
 .topActions{gap:6px}
 .storeAdd,.shoppingMode{font-size:15px;padding:10px 9px}
}
</style>
</head>
<body>

<div class="header">
<div class="title">買い物リスト</div>
<div class="topActions">
<button id="shoppingModeBtn" class="shoppingMode" onclick="toggleShoppingMode()">買うものだけ</button>
<button class="storeAdd" onclick="addStore()">店舗＋</button>
</div>
</div>

<div id="home" class="container"></div>

<div id="shopMenu" class="menu">
<button onclick="renameStore()">✏️ 店舗名変更</button>
<button onclick="deleteStore()">🗑️ 店舗削除</button>
</div>

<div id="itemMenu" class="menu">
<button onclick="renameItem()">✏️ 商品名変更</button>
<button onclick="deleteItem()">🗑️ 商品削除</button>
</div>

<script>
let currentShop=null,currentItem=null;
let shoppingMode=false;

let deleteMode = {};
let flipRects = new Map();
function toggleDeleteMode(shop){
 deleteMode[shop] = !deleteMode[shop];
 render();
}

function toggleShoppingMode(){
 shoppingMode=!shoppingMode;
 render();
}


let data=JSON.parse(localStorage.getItem('shopping_v14')||'null')||{
stores:{
'スーパー':['牛乳','卵','食パン'],
'ドラッグストア':['洗剤','ティッシュ']
},
selected:{},
order:['スーパー','ドラッグストア']
};

function save(){localStorage.setItem('shopping_v14',JSON.stringify(data));}

function ensure(){
 if(!data.order)data.order=[];
 if(!data.count)data.count={};
 if(!data.collapsed)data.collapsed={};
 Object.keys(data.stores).forEach(s=>{if(!data.order.includes(s))data.order.push(s)});
 data.order=data.order.filter(s=>data.stores[s]);
}

function addStore(){
 const n=prompt('店舗名');
 if(!n||data.stores[n]) return;
 data.stores[n]=[];
 data.order.push(n);
 if(!data.collapsed)data.collapsed={};
 data.collapsed[n]=false;
 save();render();
}

function moveTop(shop){
 data.order=data.order.filter(s=>s!==shop);
 data.order.unshift(shop);
 save();
 render();
 window.scrollTo({top:0,behavior:'smooth'});
}

function toggleItem(key){
 data.selected[key]=!data.selected[key];
 if(data.selected[key]){
  if(!data.count)data.count={};
  data.count[key]=(data.count[key]||0)+1;
 }
 save();render();
}

function toggleCollapse(shop,current){
 if(!data.collapsed)data.collapsed={};
 data.collapsed[shop]=!current;
 save();
 render();
}

function css(t){return btoa(unescape(encodeURIComponent(t))).replace(/=/g,'');}

function showShopMenu(e,shop){
 e.stopPropagation();
 currentShop=shop;
 const m=document.getElementById('shopMenu');
 m.style.left=e.pageX+'px';
 m.style.top=e.pageY+'px';
 m.style.display='block';
}

function renameStore(){
 const n=prompt('新しい店舗名',currentShop);
 if(!n||n===currentShop) return closeMenus();
 data.stores[n]=data.stores[currentShop];
 delete data.stores[currentShop];
 data.order=data.order.map(x=>x===currentShop?n:x);
 save(); render(); closeMenus();
}

function deleteStore(){
 if(confirm(currentShop+'を削除しますか？')){
  delete data.stores[currentShop];
  data.order=data.order.filter(x=>x!==currentShop);
  save(); render();
 }
 closeMenus();
}

function showItemMenu(e,shop,item){
 e.preventDefault();
 currentShop=shop;
 currentItem=item;
 const m=document.getElementById('itemMenu');
 m.style.left=e.pageX+'px';
 m.style.top=e.pageY+'px';
 m.style.display='block';
}

function renameItem(){
 const n=prompt('新しい商品名',currentItem);
 if(!n) return closeMenus();
 const arr=data.stores[currentShop];
 const i=arr.indexOf(currentItem);
 if(i>=0) arr[i]=n;
 save(); render(); closeMenus();
}

function deleteItem(){
 if(!confirm(currentItem+'を削除しますか？')) return closeMenus();
 const arr=data.stores[currentShop];
 const i=arr.indexOf(currentItem);
 if(i>=0) arr.splice(i,1);
 save(); render(); closeMenus();
}


function deleteItemDirect(shop,item){
 if(!confirm(item+'を削除しますか？')) return;
 const arr=data.stores[shop];
 const i=arr.indexOf(item);
 if(i>=0) arr.splice(i,1);
 save();
 render();
}

function closeMenus(){
 document.getElementById('shopMenu').style.display='none';
 document.getElementById('itemMenu').style.display='none';
}

document.addEventListener('click',closeMenus);

function addItem(shop,val){
 val=val.trim();
 if(!val)return;

 const normalized=val.replace(/\s+/g,'');
 const existing=data.stores[shop].find(item=>item.replace(/\s+/g,'')===normalized);

 if(!data.count)data.count={};

 if(existing){
   const k=shop+'|'+existing;
   data.selected[k]=true;
   data.count[k]=(data.count[k]||0)+1;
   save();
   render(shop);
   return;
 }

 data.stores[shop].push(val);
 const k2=shop+'|'+val;
 data.selected[k2]=true;
 data.count[k2]=(data.count[k2]||0)+1;
 save();
 render(shop);
}

function render(focusShop=null){
 ensure();
 let h='';
 const shopOrder=[...data.order];
 for(const shop of shopOrder){
 const id=css(shop);
 const visibleItems=data.stores[shop].filter(item=>!shoppingMode||data.selected[shop+'|'+item]);
 visibleItems.sort((a,b)=>{
  const ka=shop+'|'+a, kb=shop+'|'+b;
  const selA=data.selected[ka]?1:0, selB=data.selected[kb]?1:0;
  if(selA!==selB) return selB-selA;
  const cA=(data.count&&data.count[ka])||0, cB=(data.count&&data.count[kb])||0;
  return cB-cA;
 });
 if(shoppingMode&&visibleItems.length===0) continue;
 const hasSelected=data.stores[shop].some(item=>data.selected[shop+'|'+item]);
 let effectiveCollapsed;
 if(hasSelected){
  effectiveCollapsed=false;
 }else if(data.collapsed&&data.collapsed[shop]!==undefined){
  effectiveCollapsed=!!data.collapsed[shop];
 }else{
  effectiveCollapsed=true;
 }
 const showBody=shoppingMode||!effectiveCollapsed;
 h+=`<div class="card">
 <div class="shopRow">
 ${shoppingMode?'':`<button class="btn collapseBtn" onclick="toggleCollapse('${shop.replace(/'/g,"&#39;")}',${effectiveCollapsed})">${effectiveCollapsed?'▶':'▼'}</button>`}
 <div class="shop" onclick="moveTop('${shop.replace(/'/g,"&#39;")}')">${shop}</div>
 <button class="btn ${deleteMode[shop]?'deleteModeBtn':''}" onclick="toggleDeleteMode('${shop.replace(/'/g,"&#39;")}')">${deleteMode[shop]?'完了':'－'}</button>
 <button class="btn" onclick="showShopMenu(event,'${shop.replace(/'/g,"&#39;")}')">︙</button>
 </div>`;

 if(showBody){
 if(!shoppingMode){
 h+=`<div class="inputWrap" id="wrap_${id}">
 <input class="input" id="input_${id}" placeholder="商品名を入力してEnter">
 </div>`;
 }
 h+=`<div class="chips">`;

 visibleItems.forEach(item=>{
 const key=shop+'|'+item;
 if(deleteMode[shop]){
 h+=`<div class="chipWrap"><button class="chip">${item}</button><button class="deleteX" onclick="event.stopPropagation();deleteItemDirect('${shop.replace(/'/g,"&#39;")}','${item.replace(/'/g,"&#39;")}')">×</button></div>`;
}else{
 h+=`<button class="chip ${data.selected[key]?'active':''}" 
 onclick="toggleItem('${key.replace(/'/g,"&#39;")}')"
 oncontextmenu="showItemMenu(event,'${shop.replace(/'/g,"&#39;")}','${item.replace(/'/g,"&#39;")}');return false;">
 ${item}</button>`;
 }
 });

 h+='</div>';
 }
 h+='</div>';
 }
 if(!h&&shoppingMode){
  h='<div class="empty">選んだものはまだありません</div>';
 }
 flipRects.clear();

document.querySelectorAll('.chip,.chipWrap').forEach(el=>{
  const key = el.textContent.trim();
  flipRects.set(key, el.getBoundingClientRect());
});

home.innerHTML=h;
requestAnimationFrame(()=>{

  document.querySelectorAll('.chip,.chipWrap').forEach(el=>{

    const key = el.textContent.trim();
    const oldRect = flipRects.get(key);

    if(!oldRect) return;

    const newRect = el.getBoundingClientRect();

    const dx = oldRect.left - newRect.left;
    const dy = oldRect.top - newRect.top;

    if(dx || dy){

      el.style.transform = `translate(${dx}px,${dy}px)`;

      requestAnimationFrame(()=>{
        el.style.transform = '';
      });

    }

  });

}); const modeBtn=document.getElementById('shoppingModeBtn');
 if(modeBtn){
  modeBtn.classList.toggle('active',shoppingMode);
  modeBtn.textContent=shoppingMode?'通常表示':'買うものだけ';
 }

 for(const shop of data.order){
  const id=css(shop);
  const el=document.getElementById('input_'+id);
  if(el){
   el.onkeydown=(e)=>{
    if(e.key==='Enter'){
      const input=el;
      const v=input.value;
      input.value='';
      addItem(shop,v);
      setTimeout(()=>{
        const fresh=document.getElementById('input_'+id);
        if(fresh){
          fresh.value='';
          fresh.focus();
        }
      },0);
    }
   }
  }
 }

 if(focusShop){
  const id=css(focusShop);
  const wrap=document.getElementById('wrap_'+id);
  if(wrap){
   wrap.style.display='block';
   document.getElementById('input_'+id).focus();
  }
 }
}
render();
</script>
</body>
</html>
