<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>買い物リスト</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff7f8;color:#444}
.header{position:sticky;top:0;background:#fff;padding:16px;border-bottom:1px solid #eee;text-align:center}
.title{font-size:28px;font-weight:bold}
.editBtn,.backBtn{border:none;background:#f4d7df;border-radius:12px;padding:10px 14px;font-size:16px;cursor:pointer}
.editBtn{position:absolute;right:16px;top:14px}
.backWrap{padding:12px}
.container{padding:12px}
.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:12px}
.shop{font-size:22px;font-weight:bold;color:#d97a8e;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:none;border-radius:18px;padding:10px 14px;font-size:18px;cursor:pointer;background:#f4d7df}
.chip.active{background:#d97a8e;color:#fff}
.input{width:100%;padding:12px;font-size:18px;border:1px solid #ddd;border-radius:10px;box-sizing:border-box}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:18px}
.del{border:none;background:none;color:#c66;font-size:20px;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>

<div id="homePage">
  <div class="header">
    <div class="title">買い物リスト</div>
    <button class="editBtn" onclick="openEdit()">編集</button>
  </div>
  <div id="home" class="container"></div>
</div>

<div id="editPage" class="hidden">
  <div class="backWrap">
    <button class="backBtn" onclick="closeEdit()">← 戻る</button>
  </div>
  <div id="editContent" class="container"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('shopping_v10_public')||'null') || {
 stores:{
  'スーパー':['牛乳','卵','食パン','ヨーグルト'],
  'ドラッグストア':['洗剤','ティッシュ']
 },
 selected:{},
 order:['スーパー','ドラッグストア']
};

function save(){localStorage.setItem('shopping_v10_public',JSON.stringify(data));}

function ensureOrder(){
 if(!data.order) data.order=[];
 Object.keys(data.stores).forEach(s=>{ if(!data.order.includes(s)) data.order.push(s); });
 data.order=data.order.filter(s=>data.stores[s]);
}

function moveShopTop(shop){
 ensureOrder();
 data.order=data.order.filter(s=>s!==shop);
 data.order.unshift(shop);
 save();
 renderHome();
}

function toggleItem(key){
 data.selected[key]=!data.selected[key];
 save(); renderHome();
}

function openEdit(){
 homePage.classList.add('hidden');
 editPage.classList.remove('hidden');
 renderEdit();
}

function closeEdit(){
 editPage.classList.add('hidden');
 homePage.classList.remove('hidden');
 renderHome();
}

function renderHome(){
 let h='';
 ensureOrder();
 for(const shop of data.order){
   h+=`<div class="card"><div class="shop" onclick="moveShopTop(\'${shop}\')" style="cursor:pointer">${shop}</div><div class="chips">`;
   data.stores[shop].forEach(item=>{
      const key=shop+'|'+item;
      h+=`<button class="chip ${data.selected[key]?'active':''}" onclick="toggleItem('${key}')">${item}</button>`;
   });
   h+='</div></div>';
 }
 home.innerHTML=h;
}

function deleteShop(shop){delete data.stores[shop]; data.order=data.order.filter(s=>s!==shop); save(); renderEdit();}
function deleteItem(shop,i){data.stores[shop].splice(i,1); save(); renderEdit();}

function renderEdit(){
 let h=`<div class="card"><div class="shop">店舗追加</div>
 <input id="newShop" class="input" placeholder="店舗名を入力してEnter"></div>`;

 for(const shop in data.stores){
   h+=`<div class="card"><div class="shop">${shop} <button class="del" onclick="deleteShop('${shop}')">✕</button></div>
   <input id="add_${shop}" class="input" placeholder="商品名を入力してEnter"><br><br>`;

   data.stores[shop].forEach((item,i)=>{
      h+=`<div class="row"><span>${item}</span><button class="del" onclick="deleteItem('${shop}',${i})">✕</button></div>`;
   });
   h+='</div>';
 }
 editContent.innerHTML=h;

 newShop.onkeydown=(e)=>{
   if(e.key==='Enter'){
     const v=e.target.value.trim();
     if(v && !data.stores[v]){data.stores[v]=[]; data.order.push(v); save(); renderEdit();}
   }
 };

 for(const shop in data.stores){
   const el=document.getElementById('add_'+shop);
   if(el) el.onkeydown=(e)=>{
     if(e.key==='Enter'){
       const v=e.target.value.trim();
       if(v){
       data.stores[shop].push(v);
       save();
       renderEdit();
       setTimeout(()=>{
         const next=document.getElementById('add_'+shop);
         if(next){ next.value=''; next.focus(); }
       },0);
     }
     }
   }
 }
}

renderHome();
</script>
</body>
</html>
